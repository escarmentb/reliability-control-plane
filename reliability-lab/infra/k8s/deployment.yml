apiVersion: apps/v1
kind: Deployment
metadata:
  name: reliability-lab
  labels:
    app: reliability-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reliability-lab
  template:
    metadata:
      labels:
        app: reliability-lab
    spec:
      containers:
        - name: api
          image: reliability-lab:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

